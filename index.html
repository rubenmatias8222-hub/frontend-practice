<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberConnect Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div style="max-width:500px;margin:auto;padding:20px;">
    
        <h1>Contact Form</h1>

        <form id="contactForm">

            <label>Full Name</label><br>
            <input type="text" id="name" required style="width:100%;padding:8px;"><br><br>

            <label>Email</label><br>
            <input type="email" id="email" required style="width:100%;padding:8px;"><br><br>

            <label>Message</label><br>
            <textarea id="message" required style="width:100%;padding:8px;"></textarea><br><br>

            <button type="submit" style="padding:10px;width:100%;">Send</button>

        </form>

        <div id="response"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
