<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberConnect - Contact Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }

        .form-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h3 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h3>Contact Form</h3>

        <form id="contactForm">
            <label>Full Name</label>
            <input type="text" id="name" required>

            <label>Email Address</label>
            <input type="email" id="email" required>

            <label>Message</label>
            <textarea id="message" rows="5" required></textarea>

            <button type="submit">Submit Information</button>
        </form>

        <div id="response"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
