<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberConnect - Contact Form</title>
    <!-- Link to your CSS file if you have one -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic styling just in case your CSS is missing */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { color: #333; text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="form-container">
        <h3>Contact Form</h3>
        
        <form id="contact-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name..." required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email..." required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>

            <button type="submit">Submit Information</button>
        </form>
    </div>

    <!-- Link to your JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
